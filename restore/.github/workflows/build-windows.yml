name: build-windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build (PyInstaller)
        run: |
          python -m PyInstaller --clean --onefile --name ClickUp_restore-windows restore_final.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickUp_restore-windows
          path: dist/ClickUp_restore-windows.exe